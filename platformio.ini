; PlatformIO project configuration
; Motor Winding Tool — Waveshare ESP32-S3-Touch-LCD-1.28
;
; Board: ESP32-S3R2 module (W25Q128JVSIQ 16MB flash, 2MB *Quad* PSRAM
; stacked in the SoC package). The generic "esp32-s3-devkitc-1" board
; entry defaults to 8MB flash / no PSRAM, so flash size and partition
; table are overridden below to match the real 16MB part.
; Ref: https://docs.waveshare.com/ESP32-S3-Touch-LCD-1.28

[env:esp32-s3-touch-lcd-1_28]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = arduino

; --- Build / upload ---
monitor_speed = 115200
upload_speed  = 921600

board_upload.flash_size = 16MB
board_build.partitions  = default_16MB.csv

; Quad flash + Quad (not Octal) PSRAM — matches the ESP32-S3R2's stacked
; 2MB PSRAM. USB CDC on boot (the S3 enumerates as USB serial).
board_build.arduino.memory_type = qio_qspi
build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    ; LVGL: point the library at our own config file (see notes in CLAUDE.md)
    -DLV_CONF_INCLUDE_SIMPLE
    -I src

; --- Libraries ---
; Pinned to the versions the firmware was written against.
lib_deps =
    lvgl/lvgl @ ^8.3.11
    lovyan03/LovyanGFX @ ^1.1.16

; LovyanGFX auto-detects nothing here — the board is configured
; explicitly in code via the LGFX class in motor_winder.ino.
